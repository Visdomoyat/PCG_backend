{% extends "base.html" %}

{% block title %}Admin Login{% endblock %}

{% block content %}
<div class="content-admin-page">
    <div class="content-admin-container">
        <h2>Admin Login</h2>
        <hr />
        {% if form.errors %}
            <p>Invalid username or password. Please try again.</p>
        {% endif %}
        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit">Login</button>
        </form>
    </div>
</div>
{% endblock %}
